<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Barber Shop Tycoon</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden; background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; color: white;
        }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
    
        /* Top UI Dashboard */
        #ui-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; text-align: center; pointer-events: none; z-index: 10;
        }
        .header-text {
            font-weight: bold; font-size: 20px; margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9); display: flex; justify-content: space-between;
        }
        .bar-container {
            width: 100%; height: 18px; background-color: #333; border: 2px solid #fff;
            border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 5px;
        }
        #progress-bar { width: 0%; height: 100%; background-color: #4CAF50; transition: width 0.2s; }
        #accuracy-bar { width: 100%; height: 100%; background-color: #2196F3; transition: width 0.2s; }
    
        /* Money Display */
        #money-display {
            position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold;
            color: #4CAF50; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 10px;
            border: 2px solid #4CAF50; box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); z-index: 10;
        }
        /* Buttons */
        .btn {
            pointer-events: auto; background: rgba(255, 255, 255, 0.95); color: #111;
            border: 2px solid #333; padding: 12px 18px; font-size: 16px; font-weight: bold;
            border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-shop { background: #9c27b0; color: white; border-color: #fff; }
    
        #ui-bottom {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px; pointer-events: none; z-index: 10;
        }
        /* Tool Switcher */
        #tool-panel {
            position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }
        .tool-btn {
            font-size: 24px; padding: 15px; border-radius: 50%; background: #444;
            border: 3px solid #222; cursor: pointer; pointer-events: auto; transition: all 0.2s;
        }
        .tool-btn.active {
            background: #ffc107; border-color: #fff; transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.6);
        }
        /* Mini scissors button looks smaller to feel "mini" */
        #btn-mini-scissors {
            font-size: 19px !important;
            padding: 13px !important;
        }
        /* Top Right Action Buttons */
        #btn-photo { position: absolute; top: 20px; right: 20px; background: #ffc107; padding: 10px 15px; }
        #btn-shop-open { position: absolute; top: 75px; right: 20px; padding: 10px 15px; }
        #btn-force-finish {
            position: absolute; top: 130px; right: 20px; background: #4CAF50; color: white;
            padding: 10px 15px; display: none; animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 5px #4CAF50; }
            to { transform: scale(1.05); box-shadow: 0 0 15px #4CAF50; }
        }
        /* The Draggable Tool */
        #active-tool {
            position: absolute; top: 50%; left: 20px; font-size: 60px; transform: translateY(-50%);
            pointer-events: auto; z-index: 100; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            user-select: none; cursor: grab;
            transition: font-size 0.2s ease;
        }
        #active-tool:active { cursor: grabbing; }
        /* NEW: Grab hint */
        #grab-hint {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(92px);
            font-size: 18px;
            font-weight: bold;
            color: #ffc107;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 99;
            white-space: nowrap;
        }
        /* Modals */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
            z-index: 200; pointer-events: auto;
        }
        .modal-box {
            background: #222; border: 3px solid #fff; border-radius: 15px; padding: 20px;
            text-align: center; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
        }
        .modal-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; color: #ffc107; }
    
        .comparison-container { display: flex; justify-content: space-around; align-items: center; gap: 10px; margin: 15px 0; }
        .comparison-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .comparison-col img { width: 100%; max-width: 250px; border-radius: 10px; border: 2px solid #555; background: #2a2a35; }
    
        .earnings-display { font-size: 24px; font-weight: bold; color: #ffeb3b; margin: 10px 0; }
        .accuracy-display { font-size: 32px; font-weight: bold; margin: 10px 0; }
        /* NEW: Customer dialogue */
        #customer-dialogue {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 10px;
            padding: 18px 20px;
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid #ffc107;
            border-radius: 12px;
            color: #ffc107;
            text-align: center;
            font-style: italic;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
            line-height: 1.4;
        }
    
        /* Shop Styles */
        .shop-item {
            background: #333; border: 2px solid #555; border-radius: 10px; padding: 15px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .shop-item.owned { border-color: #4CAF50; background: #2e4a2e; }
        .shop-info { text-align: left; }
        .shop-title { font-size: 18px; font-weight: bold; color: #fff; }
        .shop-desc { font-size: 12px; color: #aaa; margin-top: 4px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="money-display">💵 $0</div>
    <div id="ui-top">
        <div class="header-text">
            <span id="level-text">Level 1</span>
            <span id="progress-text">Completion: 0%</span>
        </div>
        <div class="bar-container"><div id="progress-bar"></div></div>
        <div class="header-text" style="font-size: 14px; color: #aaa;">
            <span>Accuracy</span>
            <span id="accuracy-text">100%</span>
        </div>
        <div class="bar-container" style="height: 8px;"><div id="accuracy-bar"></div></div>
    </div>
    <button id="btn-photo" class="btn">📸 Request</button>
    <button id="btn-shop-open" class="btn btn-shop">🛒 Shop</button>
    <button id="btn-force-finish" class="btn">✅ Finish Cut</button>
    <div id="tool-panel">
        <div id="btn-scissors" class="tool-btn" title="Precision Scissors">✂️</div>
        <div id="btn-mini-scissors" class="tool-btn" title="Mini Scissors (30% trim)">✂️</div>
        <div id="btn-clippers" class="tool-btn" title="Bulk Clippers">🪒</div>
    </div>
    <div id="active-tool">✂️</div>
    <div id="grab-hint">👆 Grab me!</div>
    <div id="canvas-container"></div>
    <div id="ui-bottom">
        <button id="btn-left" class="btn">↺ Spin Left</button>
        <button id="btn-angle" class="btn">📐 Side View</button>
        <button id="btn-right" class="btn">Spin Right ↻</button>
    </div>
    <div id="photo-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">Client's Request</div>
            <img id="reference-img-large" src="" style="width: 80%; max-width: 300px; border-radius: 10px; border: 2px solid #555;">
            <br><br>
            <button class="btn" onclick="closePhoto()">Start Cutting ➔</button>
        </div>
    </div>
    <div id="shop-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" style="color: #9c27b0;">Studio Upgrades 🛒</div>
            <p>Current Balance: <span id="shop-balance" style="color:#4CAF50; font-weight:bold;">$0</span></p>
        
            <div id="shop-items-container"></div>
        
            <br>
            <button class="btn" onclick="closeShop()">Back to Shop ➔</button>
        </div>
    </div>
    <div id="fail-modal" class="modal-overlay">
        <div class="modal-box" style="border-color: #f44336;">
            <div class="modal-title" style="color: #f44336;">You Failed! 😡</div>
            <p>Your accuracy hit 0%. The client refused to pay!</p>
            <button class="btn" style="background: #f44336; color: white;" onclick="restartLevel()">Try Again ➔</button>
        </div>
    </div>
    <div id="level-complete-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" style="color: #4CAF50;">Job Done! 🏆</div>
            <div class="accuracy-display" id="final-accuracy-display">Accuracy: 100%</div>
            <div class="earnings-display" id="earnings-display">Base: $20 | Tip: $15 | Total: $35</div>
            <div class="comparison-container">
                <div class="comparison-col"><img id="compare-request-img" src=""><div style="color:#ddd; margin-top:5px;">Request</div></div>
                <div class="comparison-col"><img id="compare-result-img" src=""><div style="color:#ddd; margin-top:5px;">Your Cut</div></div>
            </div>
            <button class="btn" onclick="startNextLevel()">Next Client ➔</button>
            <!-- Customer dialogue added here (button is now directly above it) -->
            <div id="customer-dialogue"></div>
        </div>
    </div>
    <script>
        // --- 1. DATA & ECONOMY SYSTEM ---
        let money = parseInt(localStorage.getItem('barberMoney')) || 0;
     
        let purchased = JSON.parse(localStorage.getItem('barberPurchased')) || {
            floor: false, neon: false, goldChair: false, vipBG: false,
            proLights: false, plant: false
        };
        let enabled = JSON.parse(localStorage.getItem('barberEnabled')) || {
            floor: false, neon: false, goldChair: false, vipBG: false,
            proLights: false, plant: false
        };
        const oldUpgrades = JSON.parse(localStorage.getItem('barberUpgrades')) || {};
        ['floor','neon','goldChair','vipBG','proLights','plant'].forEach(key => {
            if (oldUpgrades.hasOwnProperty(key)) {
                purchased[key] = oldUpgrades[key];
                enabled[key] = oldUpgrades[key];
            }
        });
        if (Object.keys(oldUpgrades).length > 0) localStorage.removeItem('barberUpgrades');
        const shopData = [
            { id: 'floor', name: 'Tile Floor', desc: 'Adds a sleek floor to your studio.', price: 50 },
            { id: 'neon', name: 'Neon Studio Ring', desc: 'Cool glowing decor in the background.', price: 150 },
            { id: 'goldChair', name: 'Gold Barber Cape', desc: 'Premium luxury for your clients.', price: 300 },
            { id: 'vipBG', name: 'VIP Crimson Walls', desc: 'Exclusive high-end atmosphere.', price: 600 },
            { id: 'proLights', name: 'Pro Lighting Kit', desc: 'Brighter studio lights for perfect cuts.', price: 120 },
            { id: 'plant', name: 'Bamboo Plant', desc: 'Adds some greenery to the studio.', price: 80 }
        ];
        function updateEconomyUI() {
            document.getElementById('money-display').innerText = `💵 $${money}`;
            document.getElementById('shop-balance').innerText = `$${money}`;
            localStorage.setItem('barberMoney', money);
            localStorage.setItem('barberPurchased', JSON.stringify(purchased));
            localStorage.setItem('barberEnabled', JSON.stringify(enabled));
        }
        updateEconomyUI();
        // --- NEW: CUSTOMER DIALOGUE POOL ---
        const dialogues = {
            low: [
                "What the &*$# is this man?!?!",
                "My wife and kids are going to see me like this??",
                "I mean it’s not that bad",
                "Terrible job man",
                "Wow okay"
            ],
            medium: [
                "I thought you were a professional barber?",
                "It’s decent, but Larry gives better cuts",
                "Thank you, see you next time!",
                "Good job",
                "It’s alright, do better next time"
            ],
            high: [
                "Phenomenal",
                "There are a few spots where you could do better",
                "I’ll deal with it",
                "It’s only hair",
                "It’s that hard to give me a good haircut?"
            ],
            perfect: [
                "You gave me a better haircut than Larry down the street could!",
                "I have a lot more confidence now!",
                "Wow, man this is awesome!",
                "Dude thanks so much",
                "Thank you, I really needed a good cut"
            ]
        };
        // --- 2. SCENE SETUP & UPGRADES ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambientLight);
        const spotLight = new THREE.SpotLight(0xffeedd, 0.8); spotLight.position.set(0, 8, 6); scene.add(spotLight);
        let floorMesh = null;
        let neonMesh = null;
        let plantGroup = null;
        const drapeGeo = new THREE.CylinderGeometry(1.8, 2.6, 4, 16);
        const drapeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
        const drape = new THREE.Mesh(drapeGeo, drapeMat); drape.position.y = -1.5;
        function applyUpgradesToScene() {
            scene.background = new THREE.Color(
                (purchased.vipBG && enabled.vipBG) ? 0x3d0c11 : 0x2a2a35
            );
            drapeMat.color.setHex(
                (purchased.goldChair && enabled.goldChair) ? 0xd4af37 : 0x1a1a1a
            );
            drapeMat.metalness = (purchased.goldChair && enabled.goldChair) ? 0.6 : 0.1;
            drapeMat.roughness = (purchased.goldChair && enabled.goldChair) ? 0.2 : 0.8;
            const lightsOn = purchased.proLights && enabled.proLights;
            ambientLight.intensity = lightsOn ? 1.0 : 0.8;
            spotLight.intensity = lightsOn ? 1.2 : 0.8;
            if (purchased.floor && enabled.floor && !floorMesh) {
                const floorGeo = new THREE.PlaneGeometry(20, 20);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.2 });
                floorMesh = new THREE.Mesh(floorGeo, floorMat);
                floorMesh.rotation.x = -Math.PI / 2;
                floorMesh.position.y = -3.5;
                scene.add(floorMesh);
            } else if ((!purchased.floor || !enabled.floor) && floorMesh) {
                scene.remove(floorMesh);
                floorMesh = null;
            }
            if (purchased.neon && enabled.neon && !neonMesh) {
                const neonGeo = new THREE.TorusGeometry(5, 0.1, 16, 100);
                const neonMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                neonMesh = new THREE.Mesh(neonGeo, neonMat);
                neonMesh.position.set(0, 2, -6);
                scene.add(neonMesh);
            } else if ((!purchased.neon || !enabled.neon) && neonMesh) {
                scene.remove(neonMesh);
                neonMesh = null;
            }
            if (purchased.plant && enabled.plant && !plantGroup) {
                plantGroup = new THREE.Group();
                const potGeo = new THREE.CylinderGeometry(0.3, 0.38, 0.65, 12);
                const potMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
                const pot = new THREE.Mesh(potGeo, potMat);
                pot.position.set(4.5, -3.15, -2);
                plantGroup.add(pot);
                const soilGeo = new THREE.CylinderGeometry(0.27, 0.27, 0.1, 12);
                const soilMat = new THREE.MeshStandardMaterial({ color: 0x3d2a1f });
                const soil = new THREE.Mesh(soilGeo, soilMat);
                soil.position.set(4.5, -2.80, -2);
                plantGroup.add(soil);
                const greenMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.8 });
                const stemGeo = new THREE.CylinderGeometry(0.06, 0.04, 2.3, 8);
                const stem = new THREE.Mesh(stemGeo, greenMat);
                stem.position.set(4.5, -2.45, -2);
                plantGroup.add(stem);
                for (let i = 0; i < 7; i++) {
                    const leafGeo = new THREE.ConeGeometry(0.22, 0.75, 4);
                    const leaf = new THREE.Mesh(leafGeo, greenMat);
                    const angle = (i / 7) * Math.PI * 2 + (i % 2) * 0.3;
                    leaf.position.set(
                        4.5 + Math.cos(angle) * 0.25,
                        -2.45 + 0.6 + i * 0.22,
                        -2 + Math.sin(angle) * 0.25
                    );
                    leaf.rotation.set(Math.PI / 2, angle + 1.2, Math.random() * 0.4 - 0.2);
                    plantGroup.add(leaf);
                }
                scene.add(plantGroup);
            } else if ((!purchased.plant || !enabled.plant) && plantGroup) {
                scene.remove(plantGroup);
                plantGroup = null;
            }
        }
        // --- 3. CHARACTER SETUP ---
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);
        characterGroup.add(drape);
        const headRadius = 1.35;
        const headGeo = new THREE.SphereGeometry(headRadius, 32, 32);
        const skinMat = new THREE.MeshStandardMaterial({ roughness: 0.5 });
        const head = new THREE.Mesh(headGeo, skinMat); head.position.y = 1.5; characterGroup.add(head);
        const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(-0.4, 1.7, 1.25);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(0.4, 1.7, 1.25);
        const mouthGeo = new THREE.BoxGeometry(0.5, 0.08, 0.2);
        const mouthMat = new THREE.MeshBasicMaterial({ color: 0x331111 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat); mouth.position.set(0, 1.2, 1.3);
        characterGroup.add(leftEye, rightEye, mouth);
        const hairGroup = new THREE.Group();
        characterGroup.add(hairGroup);
        let fallingHair = [];
        // --- 4. GAME LOGIC & LEVELS ---
        let currentLevel = parseInt(localStorage.getItem('barberSaveLevel')) || 1;
        let totalTasks = 0; let correctCuts = 0; let mistakes = 0; let levelIsActive = false;
        let requestFrames = []; let resultFrames = []; let spinFrameIndex = 0;
        let isTopView = false;
    
        const skinColors = [0xf1c27d, 0x8d5524, 0xc68642, 0xe0ac69, 0x4a3123, 0xffdbac];
        const hairColors = [0x221100, 0x111111, 0x551100, 0x888888, 0xd4af37, 0x990000];
        const levels = [
            { name: "The Full Buzz", rule: (x, y, z) => 'cut' },
            { name: "The Mohawk", rule: (x, y, z) => (x < -0.4 || x > 0.4) ? 'cut' : 'full' },
            { name: "Monk Ring", rule: (x, y, z) => y > 0.5 ? 'cut' : 'full' },
            { name: "Half & Half", rule: (x, y, z) => x > 0 ? 'cut' : 'full' },
            { name: "Top Chop", rule: (x, y, z) => y > 0.8 ? 'cut' : 'full' },
            { name: "Reverse Mohawk", rule: (x, y, z) => (x > -0.3 && x < 0.3) ? 'cut' : 'full' },
            { name: "Undercut", rule: (x, y, z) => (Math.abs(x) > 0.35 || Math.abs(z) > 0.35) ? 'cut' : 'full' },
            { name: "The Fade", rule: (x, y, z) => y < 0.6 ? 'cut' : 'full' },
            { name: "Back Only", rule: (x, y, z) => z > 0 ? 'cut' : 'full' },
            { name: "Bowl Cut", rule: (x, y, z) => y > 0.45 ? 'cut' : 'full' },
            { name: "Flat Top", rule: (x, y, z) => y > 0.85 ? 'cut' : 'full' },
            { name: "Caesar Cut", rule: (x, y, z) => (y > 0.75 || Math.abs(z) > 0.4) ? 'cut' : 'full' },
            { name: "The Quiff", rule: (x, y, z) => (y > 0.55 && z < 0.1) ? 'full' : 'cut' },
            { name: "Mullet", rule: (x, y, z) => (Math.abs(x) < 0.80 && y > 0.5) ? 'full' : 'cut' },
            { name: "The Classic", rule: (x, y, z) => (y > 0.05 && Math.abs(x) < 1.2 && z < 1.8) ? 'full' : 'cut' },
            { name: "Tiny Mohawk", rule: (x, y, z) => (Math.abs(x) > 0.05 || Math.abs(z) > 1.0 || y < 0.45) ? 'cut' : 'full' }
        ];
        function loadLevel(levelNum) {
            applyUpgradesToScene();
            totalTasks = 0; correctCuts = 0; mistakes = 0; fallingHair = []; levelIsActive = false;
            document.getElementById('btn-force-finish').style.display = 'none';
            document.getElementById('fail-modal').style.display = 'none';
        
            while(hairGroup.children.length > 0){ hairGroup.remove(hairGroup.children[0]); }
            characterGroup.rotation.y = 0;
            const levelData = levels[(levelNum - 1) % levels.length];
            skinMat.color.setHex(skinColors[Math.floor(Math.random() * skinColors.length)]);
            const hairMat = new THREE.MeshStandardMaterial({ color: hairColors[Math.floor(Math.random() * hairColors.length)], roughness: 1.0 });
        
            const isMessy = Math.random() > 0.5;
            const baseLength = isMessy ? 0.25 : 0.16;
            const latSteps = 24 + Math.floor(Math.random() * 8);
            for (let lat = 0; lat <= latSteps; lat++) {
                let phi = (lat / latSteps) * (Math.PI * 0.65);
                let radiusAtLat = headRadius * Math.sin(phi);
                let circumference = 2 * Math.PI * radiusAtLat;
                let lonSteps = Math.max(1, Math.floor(circumference / 0.12));
            
                for (let lon = 0; lon < lonSteps; lon++) {
                    let theta = (lon / lonSteps) * Math.PI * 2;
                    let x = headRadius * Math.sin(phi) * Math.cos(theta);
                    let y = headRadius * Math.cos(phi);
                    let z = headRadius * Math.sin(phi) * Math.sin(theta);
                    if (z > 0.6 && y < headRadius * 0.8 && y > -headRadius * 0.5) continue;
                    let extraLength = isMessy ? (Math.random() * 0.2) : 0;
                    const segGeo = new THREE.BoxGeometry(0.16, baseLength + extraLength, 0.16);
                    const seg = new THREE.Mesh(segGeo, hairMat);
                    seg.position.set(x, 1.5 + y + (extraLength/2), z);
                    seg.lookAt(new THREE.Vector3(0, 1.5, 0));
                    const target = levelData.rule(x, y, z);
                    if (target !== 'full') totalTasks++;
                    seg.userData = { currentState: 'full', targetState: target };
                    hairGroup.add(seg);
                }
            }
            updateUI();
            takeSnapshot();
            document.getElementById('level-text').innerText = `Level ${currentLevel} - ${levelData.name}`;
            document.getElementById('photo-modal').style.display = 'flex';
            localStorage.setItem('barberSaveLevel', currentLevel);
        }
        function takeSnapshot() {
            requestFrames = [];
            hairGroup.children.forEach(seg => { if (seg.userData.targetState === 'cut') seg.visible = false; });
            camera.position.set(3, 3, 5); camera.lookAt(0, 1.5, 0);
            const originalRotation = characterGroup.rotation.y;
            for(let i=0; i<12; i++){
                characterGroup.rotation.y = (i / 12) * Math.PI * 2; renderer.render(scene, camera);
                requestFrames.push(renderer.domElement.toDataURL('image/png'));
            }
            characterGroup.rotation.y = originalRotation;
            hairGroup.children.forEach(seg => { seg.visible = true; });
            updateCameraView();
        }
        setInterval(() => {
            if (requestFrames.length > 0) {
                const reqSrc = requestFrames[spinFrameIndex % requestFrames.length];
                document.getElementById('reference-img-large').src = reqSrc;
                document.getElementById('compare-request-img').src = reqSrc;
            }
            if (resultFrames.length > 0) document.getElementById('compare-result-img').src = resultFrames[spinFrameIndex % resultFrames.length];
            spinFrameIndex++;
        }, 120);
        function updateCameraView() {
            if (isTopView) {
                camera.position.set(0, 5.0, 4.5);
            } else {
                camera.position.set(0, 2.5, 7);
            }
            camera.lookAt(0, 1.5, 0);
        }
        function toggleView() {
            isTopView = !isTopView;
            const btn = document.getElementById('btn-angle');
            btn.innerText = isTopView ? '👆 Top View' : '📐 Side View';
            updateCameraView();
        }
        // --- 5. TOOLS + GRAB HINT ---
        let currentTool = 'scissors';
        const toolIconDOM = document.getElementById('active-tool');
        function showGrabHint() {
            document.getElementById('grab-hint').style.opacity = '1';
        }
        function hideGrabHint() {
            document.getElementById('grab-hint').style.opacity = '0';
        }
        function switchTool(tool) {
            currentTool = tool;
            const icon = (tool === 'clippers') ? '🪒' : '✂️';
            toolIconDOM.innerText = icon;
            if (tool === 'mini-scissors') {
                toolIconDOM.style.fontSize = '42px';
            } else {
                toolIconDOM.style.fontSize = '60px';
            }
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if (tool === 'scissors') document.getElementById('btn-scissors').classList.add('active');
            else if (tool === 'mini-scissors') document.getElementById('btn-mini-scissors').classList.add('active');
            else if (tool === 'clippers') document.getElementById('btn-clippers').classList.add('active');
            // Show grab hint every time player switches tools
            showGrabHint();
        }
        document.getElementById('btn-scissors').addEventListener('click', () => switchTool('scissors'));
        document.getElementById('btn-mini-scissors').addEventListener('click', () => switchTool('mini-scissors'));
        document.getElementById('btn-clippers').addEventListener('click', () => switchTool('clippers'));
        switchTool('scissors');
        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
        let isGrabbingTool = false; let targetChairRotation = 0;
        function onPointerDown(e) {
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('tool-btn')) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = toolIconDOM.getBoundingClientRect();
            if (clientX >= rect.left - 40 && clientX <= rect.right + 40 && clientY >= rect.top - 40 && clientY <= rect.bottom + 40) {
                isGrabbingTool = true;
                toolIconDOM.style.transition = 'none';
                hideGrabHint(); // hide hint the moment they grab it
                updateInteraction(e);
            }
        }
        function onPointerMove(e) { if (!isGrabbingTool || !levelIsActive) return; updateInteraction(e); }
        function onPointerUp() {
            if (isGrabbingTool) {
                isGrabbingTool = false;
                toolIconDOM.style.transition = 'top 0.3s, left 0.3s, font-size 0.2s';
                toolIconDOM.style.left = '20px';
                toolIconDOM.style.top = '50%';
                toolIconDOM.style.transform = 'translateY(-50%) rotate(0deg)';
            }
        }
        function evaluateHit(seg) {
            let current = seg.userData.currentState; let target = seg.userData.targetState;
            if (current === target) { correctCuts++; }
            else if (target === 'full') { mistakes++; flashRed(); }
            updateUI();
        }
        function flashRed() {
            document.body.style.backgroundColor = "#4a1111";
            setTimeout(() => { document.body.style.backgroundColor = (purchased.vipBG && enabled.vipBG) ? "#3d0c11" : "#111"; }, 100);
        }
        function updateInteraction(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            toolIconDOM.style.left = (clientX - 30) + 'px';
            toolIconDOM.style.top = (clientY - 30) + 'px';
            const time = Date.now() * 0.02;
            toolIconDOM.style.transform = (currentTool === 'scissors' || currentTool === 'mini-scissors')
                ? `rotate(${Math.sin(time) * 20}deg)`
                : `rotate(${Math.sin(time) * 5}deg) translateY(${Math.cos(time) * 5}px)`;
        
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(head);
            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;
                hairGroup.children.forEach(seg => {
                    if (seg.userData.currentState === 'cut') return;
                    const segPos = new THREE.Vector3(); seg.getWorldPosition(segPos);
                    let isHit = false;
                    if (currentTool === 'scissors') {
                        if (segPos.distanceTo(hitPoint) < 0.28) isHit = true;
                    } else if (currentTool === 'mini-scissors') {
                        if (segPos.distanceTo(hitPoint) < 0.196) isHit = true;
                    } else if (currentTool === 'clippers') {
                        if (segPos.distanceTo(hitPoint) < 0.64) isHit = true;
                    }
                
                    if (isHit) {
                        seg.userData.currentState = 'cut';
                        seg.visible = false;
                        const chunk = seg.clone(); chunk.visible = true; scene.add(chunk);
                        fallingHair.push({ mesh: chunk, vy: 0, vx: (Math.random()-0.5)*0.1, vz: (Math.random()-0.5)*0.1, rx: Math.random() });
                        evaluateHit(seg);
                    }
                });
            }
        }
        function updateUI() {
            let progressRaw = (correctCuts / totalTasks) * 100;
            let progressPercent = Math.min(100, Math.floor(progressRaw || 0));
        
            let accuracyPercent = 100;
            if (mistakes > 0) accuracyPercent = Math.max(0, 100 - Math.floor((mistakes / totalTasks) * 150));
            document.getElementById('progress-bar').style.width = progressPercent + '%';
            document.getElementById('progress-text').innerText = `Completion: ${progressPercent}%`;
            document.getElementById('accuracy-bar').style.width = accuracyPercent + '%';
            document.getElementById('accuracy-text').innerText = `${accuracyPercent}%`;
            if (accuracyPercent <= 0 && levelIsActive) {
                levelIsActive = false; onPointerUp(); document.getElementById('fail-modal').style.display = 'flex'; return;
            }
            if (progressPercent >= 85) document.getElementById('btn-force-finish').style.display = 'block';
            if (progressPercent >= 99 && levelIsActive) {
                levelIsActive = false; setTimeout(() => { showLevelComplete(accuracyPercent); }, 800);
            }
        }
        function showLevelComplete(finalAccuracy) {
            onPointerUp(); resultFrames = [];
            camera.position.set(3, 3, 5); camera.lookAt(0, 1.5, 0);
            const originalRotation = characterGroup.rotation.y;
            for(let i=0; i<12; i++){
                characterGroup.rotation.y = (i / 12) * Math.PI * 2; renderer.render(scene, camera);
                resultFrames.push(renderer.domElement.toDataURL('image/png'));
            }
            characterGroup.rotation.y = originalRotation;
            updateCameraView();
            let accuracyColor = finalAccuracy >= 80 ? "#4CAF50" : (finalAccuracy >= 50 ? "#ff9800" : "#f44336");
            document.getElementById('final-accuracy-display').innerText = `Accuracy: ${finalAccuracy}%`;
            document.getElementById('final-accuracy-display').style.color = accuracyColor;
            let basePay = 20;
            let tip = Math.floor(finalAccuracy * 0.3);
            if (finalAccuracy < 50) { basePay = 0; tip = 0; }
            let total = basePay + tip;
        
            money += total;
            updateEconomyUI();
            document.getElementById('earnings-display').innerText = `Base: $${basePay} | Tip: $${tip} | Total: $${total}`;
            // NEW: Pick random customer dialogue based on accuracy
            let category;
            if (finalAccuracy <= 65) {
                category = 'low';
            } else if (finalAccuracy <= 80) {
                category = 'medium';
            } else if (finalAccuracy <= 94) {
                category = 'high';
            } else {
                category = 'perfect';
            }
            const possibleDialogues = dialogues[category];
            const randomDialogue = possibleDialogues[Math.floor(Math.random() * possibleDialogues.length)];
            document.getElementById('customer-dialogue').innerText = `"${randomDialogue}"`;
            document.getElementById('level-complete-modal').style.display = 'flex';
        }
        // --- 7. SHOP LOGIC ---
        function openShop() {
            levelIsActive = false; onPointerUp();
            const container = document.getElementById('shop-items-container');
            container.innerHTML = '';
        
            shopData.forEach(item => {
                const isPurchased = purchased[item.id];
                const isEnabled = enabled[item.id];
                let btnHTML;
                if (!isPurchased) {
                    btnHTML = `<button class="btn btn-shop" onclick="buyItem('${item.id}', ${item.price})">$${item.price}</button>`;
                } else {
                    const toggleText = isEnabled ? 'Disable ❌' : 'Enable ✅';
                    const toggleStyle = isEnabled ? 'background:#4CAF50;color:white;' : '';
                    btnHTML = `<button class="btn" style="${toggleStyle}" onclick="toggleUpgrade('${item.id}')">${toggleText}</button>`;
                }
                container.innerHTML += `
                    <div class="shop-item ${isPurchased ? 'owned' : ''}">
                        <div class="shop-info">
                            <div class="shop-title">${item.name}</div>
                            <div class="shop-desc">${item.desc}</div>
                        </div>
                        ${btnHTML}
                    </div>
                `;
            });
            document.getElementById('shop-modal').style.display = 'flex';
        }
        window.buyItem = function(id, price) {
            if (money >= price && !purchased[id]) {
                money -= price;
                purchased[id] = true;
                enabled[id] = true;
                updateEconomyUI();
                applyUpgradesToScene();
                openShop();
            } else {
                alert("Not enough money!");
            }
        };
        window.toggleUpgrade = function(id) {
            if (!purchased[id]) return;
            enabled[id] = !enabled[id];
            localStorage.setItem('barberEnabled', JSON.stringify(enabled));
            applyUpgradesToScene();
            openShop();
        };
        function closeShop() {
            document.getElementById('shop-modal').style.display = 'none';
            levelIsActive = true;
        }
        // --- 8. EVENT LISTENERS ---
        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('pointercancel', onPointerUp);
        document.getElementById('btn-left').addEventListener('click', () => { targetChairRotation -= Math.PI / 4; });
        document.getElementById('btn-right').addEventListener('click', () => { targetChairRotation += Math.PI / 4; });
        document.getElementById('btn-angle').addEventListener('click', toggleView);
        document.getElementById('btn-photo').addEventListener('click', () => { document.getElementById('photo-modal').style.display = 'flex'; });
        document.getElementById('btn-shop-open').addEventListener('click', openShop);
    
        document.getElementById('btn-force-finish').addEventListener('click', () => {
            if (levelIsActive) {
                levelIsActive = false;
                let finalAccuracy = 100;
                if (mistakes > 0) finalAccuracy = Math.max(0, 100 - Math.floor((mistakes / totalTasks) * 150));
                showLevelComplete(finalAccuracy);
            }
        });
        function closePhoto() {
            document.getElementById('photo-modal').style.display = 'none';
            levelIsActive = true;
            showGrabHint(); // show hint when player starts cutting
        }
        function startNextLevel() { document.getElementById('level-complete-modal').style.display = 'none'; currentLevel++; loadLevel(currentLevel); }
        function restartLevel() { document.getElementById('fail-modal').style.display = 'none'; loadLevel(currentLevel); }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        // --- 9. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            characterGroup.rotation.y += (targetChairRotation - characterGroup.rotation.y) * 0.1;
        
            if (neonMesh) {
                neonMesh.rotation.z += 0.01;
                neonMesh.rotation.x += 0.005;
            }
            for (let i = fallingHair.length - 1; i >= 0; i--) {
                const fh = fallingHair[i];
                fh.vy -= 0.006;
                fh.mesh.position.y += fh.vy;
                fh.mesh.position.x += fh.vx;
                fh.mesh.position.z += fh.vz;
                fh.mesh.rotation.x += fh.rx;
                fh.mesh.rotation.z += fh.rx;
                if (fh.mesh.position.y < -3.5) {
                    scene.remove(fh.mesh);
                    fallingHair.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }
        loadLevel(currentLevel);
        updateCameraView();
        animate();
    </script>
</body>
</html>
